services:
  engine:
    build: .
    command: python engine.py
    working_dir: /app/alalu_bot
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    working_dir: /app/alalu_bot
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - engine

  frontend:
    build: alalu_bot/dashboard
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api
