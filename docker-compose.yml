services:
  engine:
    build: .
    command: python alalu_bot/engine.py
    environment:
      DATA_DIR: /app/data
    volumes:
      - bot-data:/app/data
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    working_dir: /app/alalu_bot
    environment:
      DATA_DIR: /app/data
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    depends_on:
      - engine

  frontend:
    build: alalu_bot/dashboard
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  bot-data:
